# Application settings

# Delay in seconds between actions (for visibility)
action_delay: 1.5

# Open the personal letter text copy in an editor before continuing
personal_letter_editor_enabled: true

# Number of job listings to fetch per API page
api_batch_size: 25

# JobTech API base URL
api_base_url: "https://jobsearch.api.jobtechdev.se"

# Local LLM enrichment via Ollama
ollama_enabled: true
ollama_base_url: "http://127.0.0.1:11434"
ollama_model: "qwen3.5:9b"
ollama_timeout_seconds: 90

# Browser settings
browser_headless: false
browser_slow_mo: 500  # milliseconds between Playwright actions

# Form submission behavior
# false = fill form only, user submits manually
# true = fill form and click submit automatically
auto_submit: false

# Maximum number of visible form fields to consider a form "simple"
max_simple_form_fields: 10

# Automatically accept cookie consent banners
auto_accept_cookies: true
